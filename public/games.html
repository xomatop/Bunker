<!-- games.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Rooms</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://media.discordapp.net/attachments/765366078138089522/1190097711685447680/43567890-3JE789R75R86DFCLR7I89OL.png?ex=65ceb45d&is=65bc3f5d&hm=eb0847cacd3e883ec43ab92dd86f5340f8c54552f2034f1c2c7f67e6961973a5&=&format=webp&quality=lossless&width=1091&height=682');
      background-size: cover;
      z-index: -1;
      font-family: 'Exo 2', sans-serif;
    }
    
    .content {
      position: relative;
      top: 40px; /* Отступ сверху */
      text-align: center;
      color: white;
    }

    .games-title {
      margin-top: 0;
    }

    .games {
      padding: 0 60px; /* Отступы от боков экрана */
    }

    .game-room {
      margin-top: 40px; /* Отступ между комнатами */
      border: 1px solid white; /* Белая обводка */
      border-radius: 10px; /* Скругление углов */
      background-color: rgba(255, 255, 255, 0.2); /* Белый цвет с прозрачностью */
      backdrop-filter: blur(10px); /* Блюр */
      padding: 20px; /* Внутренний отступ */
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .room-info {
      display: flex;
      align-items: center;
    }

    .room-name {
      margin-left: 40px;
    }

    .room-players {
      margin-left: 20px;
    }

    .join-button {
      margin-right: 20px;
      background-color: rgb(79, 172, 79);
      border: 1px solid white;
      color: white;
      border-radius: 10px;
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 2px;
      padding-bottom: 2px;
    }

    .create-button {
      background-color: rgb(79, 172, 79);
      border: 1px solid white;
      color: white;
      border-radius: 10px;
      padding-left: 20px;
      padding-right: 20px;
      padding-top: 5px;
      padding-bottom: 5px;
      margin-bottom: 20px;
    }

  </style>
</head>
<body>
  <!-- Кнопка для создания игры -->
  <div class="background"></div>
  <div class="content">
    <h1 class="games-title">Игровые комнаты</h1>
    <button id="createGameButton" class="create-button">Create Game</button>
    <div class="games" id="gameRooms">
      <!-- Переместил кнопку за пределы формы -->
    </div>
    <!-- Переместил кнопку за пределы формы -->
    
  </div>
  <!-- Скрипт для работы со списком игровых комнат -->
  <script src="games.js"></script>
</body>
</html>
