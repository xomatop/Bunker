<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Registration</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://media.discordapp.net/attachments/765366078138089522/1190097711685447680/43567890-3JE789R75R86DFCLR7I89OL.png?ex=65ceb45d&is=65bc3f5d&hm=eb0847cacd3e883ec43ab92dd86f5340f8c54552f2034f1c2c7f67e6961973a5&=&format=webp&quality=lossless&width=1091&height=682');
      background-size: cover;
      z-index: -1;
      font-family: 'Exo 2', sans-serif;
    }

    .content {
      position: relative;
      top: 100px;
      text-align: center;
      color: white;
    }

    .registration-title {
      margin-top: 0;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="password"],
    button {
      width: 200px;
      height: 35px;
      border: 1px solid black;
      border-radius: 10px;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      padding-left: 10px;
      padding-right: 10px;
    }

    button {
      width: 200px; /* компенсация для кнопки из-за обводки */
      background-color: rgb(79, 172, 79);
      color: white;
      border: 1px solid black;
      border-radius: 10px;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      padding-top: 5px;
      padding-bottom: 5px;
      display: block;
      margin-top: 10px;
      text-decoration: none;
      
    }

    a {
      width: 200px; /* компенсация для кнопки из-за обводки */
      background-color: rgb(79, 172, 79);
      color: white;
      border: 1px solid black;
      border-radius: 10px;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      padding-top: 5px;
      padding-bottom: 5px;
    }

    input[type="date"] {
      -webkit-appearance: none;
    }

    input, button {
      margin: 5px;
    }

    .login-link {
      color: white;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
      display: inline-block;
    }

    .login-link:hover {
      text-decoration: underline;
    }

    .error-message,
    #usernameError,
    #emailError {
      color: red;
      font-size: 14px;
      display: none; /* Скрываем уведомления изначально */
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
  <!-- Форма регистрации -->
  <div class="background"></div>
  <div class="content">
    <h1 class="registration-title">Регистрация</h1>
    <form id="registrationForm">
      <input type="text" id="username" placeholder="Имя" required>
      <input type="email" id="email" placeholder="Почта" required>
      <input type="date" id="birthdate" placeholder="Дата рождения" required>
      <input type="password" id="password" placeholder="Пароль" required>
      <button type="submit">Зарегистрироваться</button>  
      <div id="usernameError" class="error-message">Имя пользователя уже занято</div>
      <div id="emailError" class="error-message">Почта уже используется</div>      
      <a href="login.html" class="login-link button">Уже есть аккаунт</a>
    </form>
    <!-- Уведомления о занятом логине или почте -->
    <div id="errorMessage" class="error-message">Username or email is already in use</div>
    <!-- Ссылка на страницу входа -->
  </div>
  <!-- Скрипт для отправки данных формы на сервер -->
  <script src="registration.js"></script>
</body>
</html>
